<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>KioNet - Tu Kiosco Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/home.css}" />

</head>

<body>
<div class="container-fluid">

    <header class="main-header">
        <a class="navbar-brand" href="#">
            <img th:src="@{/img/KioNet.png}" alt="logo">
        </a>

        <div class="header-center">
            <form th:action="@{/home}" method="GET" class="search-form">
                <div class="search-wrapper">
                    <input type="search" name="busqueda" class="form-control-search" placeholder="Buscar productos..." th:value="${param.busqueda}">
                    <button type="submit" class="btn-search">Buscar</button>
                </div>
            </form>
        </div>

        <div class="header-right">
            <div class="carrito-widget">
                <div class="cart-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 01.98 1.61h9.72a2 2 0 0 01.98-1.61L23 6H6"/></svg>
                </div>
                <div class="cart-info">
                    <a href="/spring/carrito" class="cart-link">Ver carrito</a>
                    <p class="cart-total">$00000</p>
                </div>
            </div>


        </div>
    </header>
    <main class="main">
        <section class="panel-cliente">
            <div class="perfil-widget">
                <img th:if="${usuario.fotoPerfil != null}" th:src="${usuario.fotoPerfil}" alt="perfil" class="avatar">
                <img th:unless="${usuario.fotoPerfil != null}" th:src="@{/imagenes/imagenesDefault/default-user.jpg}" alt="perfil" class="avatar">
                <p class="welcome-text">Hola, <span th:text="${usuario.nombre}"></span></p>
            </div>

            <a href="login.html" class="btn-logout">Cerrar sesión</a>

        </section><!--FIN PANEL LATERAL CLIENTE-->
        <section class="panel-tienda">
            <div class="welcome-banner">
                <h1>Bienvenidos a KioNet UNLAM</h1>
                <h2>Hacé tu pedido hoy, tu hijo retira mañana</h2>
            </div>

            <nav class="categories-nav">
                <a class="category-chip"
                   th:href="@{/home}"
                   th:classappend="${param.categoria == null} ? 'active' : ''">Todos</a>

                <th:block th:each="categoriaProd : ${categorias}">
                    <a class="category-chip"
                       th:href="@{/home(categoria=${categoriaProd.nombreCategoria})}"
                       th:text="${categoriaProd.nombreCategoria}"
                       th:classappend="${param.categoria != null && param.categoria[0] == categoriaProd.nombreCategoria} ? 'active' : ''"></a>
                </th:block>
            </nav>
            <section class="products-section" th:if="${productosBuscados != null}">
                <h2 class="subtitulos">Resultados de la búsqueda:</h2>

                <div class="products-grid" th:unless="${#lists.isEmpty(productosBuscados)}">
                    <div class="product-card" th:each="producto : ${productosBuscados}">
                        <div class="product-image-wrapper">
                            <img th:if="${producto.imagen != null}" th:src="${producto.imagen}" alt="golo">
                            <img th:unless="${producto.imagen != null}" th:src="@{/imagenes/imagenesDefault/caramelo.png}" alt="golo">
                        </div>

                        <div class="product-info">
                            <h4 th:text="${producto.nombre}"></h4>
                            <p class="product-desc" th:text="${producto.descripcion}"></p>
                            <span class="product-price">$ <th:block th:text="${producto.precio}"></th:block></span>
                        </div>
                    </div>
                </div>
                <hr class="section-divider">
            </section>

            <section class="products-section">
                <h2 class="subtitulos" th:text="${param.categoria != null} ? ${param.categoria} : 'Todos los productos'"></h2>

                <div class="products-grid">
                    <div class="product-card" th:each="producto : ${productos}">
                        <div class="product-image-wrapper">
                            <img th:if="${producto.imagen != null}" th:src="${producto.imagen}" alt="golo">
                            <img th:unless="${producto.imagen != null}" th:src="@{/imagenes/imagenesDefault/caramelo.png}" alt="golo">
                        </div>

                        <div class="product-info">
                            <h4 th:text="${producto.nombre}"></h4>
                            <p class="product-desc" th:text="${producto.descripcion}"></p>
                            <span class="product-price">$ <th:block th:text="${producto.precio}"></th:block></span>
                        </div>

                        <form action="carrito/agregar" method="post" class="add-to-cart-form">
                            <input type="hidden" name="productoId" th:value="${producto.id}">
                            <button type="submit" class="btn-add-product">+ Agregar al carrito</button>
                        </form>
                    </div>
                </div>
            </section>

        </section><!--FIN PANEL TIENDA-->
    </main>

</div>
</body>
        <!-- Boostrap core js -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
                crossorigin="anonymous">
        </script>
</html>
