<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Imprimir Credenciales - KioNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/variablesColor.css}" />
    <link rel="stylesheet" th:href="@{/css/credenciales.css}" />
    <link rel="stylesheet" th:href="@{/css/vistaHijos.css}" />

</head>

<body>
<div class="barra-herramientas">
    <div class="filtros">
        <a th:href="@{/vistaHijos}" class="btn-volver">← Volver</a>
        <label class="checkbox-label">
            <input type="checkbox" id="checkTodos" checked> <strong>Todos</strong>
        </label>
        <hr style="height: 20px; border: 0; border-left: 1px solid #ccc; margin: 0 5px;">

        <th:block th:each="hijo : ${hijos}">
            <label class="checkbox-label">
                <input type="checkbox" class="check-hijo" th:data-id="${hijo.id}" checked>
                <span th:text="${hijo.nombre}"></span>
            </label>
        </th:block>
    </div>
    <button class="btn-imprimir" onclick="window.print()">Imprimir / Guardar PDF</button>
</div>

<div class="hoja-a4" id="contenedorHojas">
    <div class="credencial-card" th:each="hijo : ${hijos}" th:id="'credencial-' + ${hijo.id}">
        <img th:if="${hijo.fotoPerfil != null}" th:src="${hijo.fotoPerfil}" class="foto-lado" alt="Rostro Alumno">
        <div th:unless="${hijo.fotoPerfil != null}" class="foto-placeholder">
            <span th:text="${#strings.substring(hijo.nombre,0,1)}"></span>
        </div>

        <div class="datos-lado">
            <span class="colegio-header">KioNet Credencial Escolar</span>
            <h2 class="alumno-nombre" th:text="${hijo.nombre + ' ' + hijo.apellido}"></h2>
            <span class="alumno-curso" th:text="${hijo.curso.descripcion}"></span>
            <span class="uso-credencial">Retiro de Golosinas Autorizado</span>
        </div>
    </div>
</div>
<script th:src="@{/js/credenciales.js}"></script>

</body>
</html>
