<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <div class="left-panel" th:fragment="panelIzqLogin">

    <div class="brand">
        <div class="brand-icon">
            <a href="login"><img class="logo-img" th:src="'https://res.cloudinary.com/dqrka5zry/image/upload/v1780531490/KioNet_imp3c0.png'" alt="logo"></a>
        </div>
        <div class="brand-text">
            <h1>UNLaM</h1>
            <p>Pedí desde tu casa, tu hijo retira mañana</p>
        </div>
    </div>

    <div class="hero-copy">
        <h2>Todo lo que necesitás,<br><span>en un solo lugar</span></h2>
        <p>Gestioná las compras del kiosco desde donde estés. Sin efectivo, sin filas, sin complicaciones.</p>
        <div class="basket-wrap">
            <div class="basket-blob"></div>
            <img th:src="'https://res.cloudinary.com/dqrka5zry/image/upload/v1780531490/KioNet_imp3c0.png'" alt="Kiosco" class="basket-emoji" />            </div>
    </div>

    <div class="badges">
        <div class="badge-item">
            <div class="badge-icon purple">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5B3FE4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div><strong>Seguro</strong><span>Tus datos protegidos</span></div>
        </div>
        <div class="badge-item">
            <div class="badge-icon green">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div><strong>En tiempo real</strong><span>Seguimiento de pedidos</span></div>
        </div>
        <div class="badge-item">
            <div class="badge-icon amber">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            </div>
            <div><strong>Notificaciones</strong><span>Alertas y novedades</span></div>
        </div>
    </div>

</div>

</body>
</html>
