<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Mi Perfil - KioNet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <link rel="stylesheet" th:href="@{/css/perfil.css}" />
</head>

<body>
<div class="container-fluid">

    <div th:replace="fragmentos/header :: header"></div>

    <main class="main">

        <!-- PANEL LATERAL IZQUIERDO (igual que home) -->
        <section class="panel-cliente">
            <div class="perfil-widget">
                <img th:if="${usuario.fotoPerfil != null}" th:src="${usuario.fotoPerfil}" alt="perfil" class="avatar">
                <img th:unless="${usuario.fotoPerfil != null}" th:src="@{/imagenes/imagenesDefault/default-user.jpg}" alt="perfil" class="avatar">
                <p class="welcome-text">Hola, <span th:text="${usuario.nombre}"></span></p>
            </div>
            <a href="/spring/home" class="btn-volver">← Volver al inicio</a>
        </section>

        <!-- PANEL PRINCIPAL PERFIL -->
        <section class="panel-tienda">

            <div class="welcome-banner">
                <h1>Mi Perfil</h1>
                <h2>Administrá tu información personal</h2>
            </div>

            <div class="perfil-card">

                <div class="perfil-card-header">
                    <img th:if="${usuario.fotoPerfil != null}" th:src="${usuario.fotoPerfil}" alt="foto de perfil" class="perfil-avatar">
                    <img th:unless="${usuario.fotoPerfil != null}" th:src="@{/imagenes/imagenesDefault/default-user.jpg}" alt="foto de perfil" class="perfil-avatar">
                    <div>
                        <h2 class="perfil-nombre">
                            <span th:text="${usuario.nombre}"></span>
                            <span th:text="${usuario.apellido}"></span>
                        </h2>
                        <p class="perfil-email-sub" th:text="${usuario.email}"></p>
                    </div>
                </div>

                <div class="perfil-datos">
                    <div class="perfil-dato">
                        <span class="dato-label">Nombre</span>
                        <span class="dato-valor" th:text="${usuario.nombre}"></span>
                    </div>
                    <div class="perfil-dato">
                        <span class="dato-label">Apellido</span>
                        <span class="dato-valor" th:text="${usuario.apellido}"></span>
                    </div>
                    <div class="perfil-dato">
                        <span class="dato-label">Email</span>
                        <span class="dato-valor" th:text="${usuario.email}"></span>
                    </div>
                    <div class="perfil-dato">
                        <span class="dato-label">Teléfono</span>
                        <span class="dato-valor" th:text="${usuario.telefono}"></span>
                    </div>
                </div>

            </div>

        </section>

<!--                                &lt;!&ndash;nombre y curso aca&ndash;&gt;-->
<!--                        </h2>-->
<!--                    </div>-->

<!--                <div>-->

<!--            </div>-->

<!--            </div>-->
<!--        </section>-->

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>
</html>
