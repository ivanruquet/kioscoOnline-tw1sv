<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Mi Perfil - KioNet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/variablesColor.css}" />
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <link rel="stylesheet" th:href="@{/css/perfil.css}" />
    <link rel="stylesheet" th:href="@{/css/vistaEdicion.css}" />

</head>

<body>
<div class="container-fluid">

    <div th:replace="fragmentos/header :: header"></div>

    <main class="main">
        <section class="panel-cliente">
            <div th:replace="fragmentos/panelIzqCliente :: panelCliente"></div>

            <a th:href="@{/home}" class="btn-volver"> Ir a Tienda</a>

        </section>


        <!-- PANEL PRINCIPAL PERFIL -->
        <section class="panel-tienda">

            <div class="welcome-banner-usuario">
                <div>
                    <h1>Mi Perfil</h1>
                    <h2>Administrá tu información personal</h2>

                </div>

                <button class="btn-editar" onclick="activarEdicion()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                    </svg>
                    Editar
                </button>
            </div>

            <div class="perfil-card">

                <div class="perfil-card-header">
                    <img th:if="${usuario.fotoPerfil != null}" th:src="${usuario.fotoPerfil}" alt="foto de perfil" class="perfil-avatar">
                    <img th:unless="${usuario.fotoPerfil != null}" th:src="@{/imagenes/imagenesDefault/default-user.jpg}" alt="foto de perfil" class="perfil-avatar">
                    <div>
                        <h2 class="perfil-nombre">
                            <span th:text="${usuario.nombre}"></span>
                            <span th:text="${usuario.apellido}"></span>
                        </h2>
                        <p class="perfil-email-sub" th:text="${usuario.email}"></p>
                    </div>
                </div>
                    <div id="perfil-datos">  <!-- este es el que recibe en-edicion -->

                    <div class="perfil-datos vista-lectura"><!--vista lectura-->
                        <div class="perfil-dato">
                            <span class="dato-label">Nombre</span>
                            <span class="dato-valor" th:text="${usuario.nombre}"></span>
                        </div>
                        <div class="perfil-dato">
                            <span class="dato-label">Apellido</span>
                            <span class="dato-valor" th:text="${usuario.apellido}"></span>
                        </div>
                        <div class="perfil-dato">
                            <span class="dato-label">Email</span>
                            <span class="dato-valor" th:text="${usuario.email}"></span>
                        </div>
                        <div class="perfil-dato">
                            <span class="dato-label">Celular</span>
                            <span class="dato-valor" th:text="${usuario.celular}"></span>
                        </div>
                        <div class="perfil-dato">
                            <span class="dato-label">Foto de perfil</span>
                            <span class="dato-valor" th:text="${usuario.fotoPerfil != null ? usuario.fotoPerfil : 'Sin foto personalizada'}"></span>
                        </div>
                    </div><!--fin vista lectura-->
                    <!-- VISTA EDICIÓN -->
                    <div class="vista-edicion">
                        <form th:action="@{/editarPerfil}" method="post" class="form-edicion">

                            <div class="campo-edicion">
                                <span class="dato-label">Email</span>
                                <input type="email" name="email"
                                       th:value="${usuario.email}"
                                       placeholder="tu@email.com" />
                            </div>

                            <div class="campo-edicion">
                                <span class="dato-label">Teléfono</span>
                                <input type="tel" name="celular"
                                       th:value="${usuario.celular}"
                                       placeholder="Ej: 1123456789" />
                            </div>

                            <div class="campo-edicion">
                                <span class="dato-label">Foto de perfil</span>
                                <div class="foto-edicion-wrap">
                                    <img id="fotoPreview"
                                         th:src="${usuario.fotoPerfil != null ? usuario.fotoPerfil : '/spring/imagenes/imagenesDefault/default-user.jpg'}"
                                         alt="preview"
                                         class="foto-preview" />
                                    <input type="file" name="fotoPerfil"
                                           id="inputFoto"
                                           th:value="${usuario.fotoPerfil}"
                                           placeholder="https://..."
                                           oninput="previsualizarFoto(this.value)" />
                                </div>
                            </div>

                            <div class="acciones-edicion">
                                <button type="button" class="btn-cancelar" onclick="cancelarEdicion()">Cancelar</button>
                                <button type="submit" class="btn-guardar">Guardar</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
<script th:src="@{/js/edicionPerfil.js}"></script>
</body>
</html>
