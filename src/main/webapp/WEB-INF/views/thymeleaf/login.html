<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Kiosco UNLAM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/login.css}" />

</head>

<body>
<div class="page-wrap">

    <!-- ── LEFT PANEL ── -->
    <div th:replace="fragmentos/panelIzqLogin :: panelIzqLogin"></div>


    <!-- ── RIGHT PANEL ── -->
    <div class="right-panel">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://res.cloudinary.com/dqrka5zry/image/upload/v1780531490/KioNet_imp3c0.png" alt="KioNet">
            </div>
            <h2>Iniciar sesión</h2>
            <p class="subtitle">Ingresá para continuar a KioNet Unlam</p>

            <!-- Error (Thymeleaf) -->
            <div th:if="${error != null}" class="alert-custom">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span th:text="'Error: ' + ${error}"></span>
            </div>

            <form action="#" th:action="@{/validar-login}" method="POST" th:object="${datosLogin}">

                <label class="form-label" for="email">Email</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input th:field="*{email}" id="email" type="email" class="form-control" placeholder="ejemplo@correo.com" required />
                </div>

                <label class="form-label" for="password">Contraseña</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    </span>
                    <input th:field="*{password}" id="password" type="password" class="form-control" placeholder="••••••••" required />
                    <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Mostrar contraseña">
                        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>

                <div class="extras">
                    <label class="remember">
                        <input type="checkbox" name="rememberMe">
                        <span>Recordarme</span>
                    </label>
                    <a th:href="@{/cambiarContrasenia}" class="forgot">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" id="btn-login" class="btn-login" disabled>
                    Iniciar sesión
                </button>

            </form>

            <!--            <div class="divider"><span>o continuá con</span></div>-->

            <!--            <a href="#" class="btn-social">-->
            <!--                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">-->
            <!--                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>-->

            <!--                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>-->
            <!--                </svg>-->
            <!--                Continuar con Google-->
            <!--            </a>-->

            <!--            <a href="#" class="btn-social">-->
            <!--                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">-->
            <!--                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>-->
            <!--                </svg>-->
            <!--                Continuar con Apple-->
            <!--            </a>-->

            <p class="register-link">
                ¿No tenés cuenta? <a href="nuevo-usuario">Registrate aquí</a>
            </p>

        </div>

        <div class="security-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <div>
                <strong>Plataforma 100% segura</strong>
                <span>Tus datos están protegidos</span>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

<script type="module" th:src="@{js/login.js}"></script>

<script>
    // Toggle password visibility
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput  = document.getElementById('password');
    const eyeIcon   = document.getElementById('eyeIcon');

    togglePwd.addEventListener('click', () => {
        const show = pwdInput.type === 'password';
        pwdInput.type = show ? 'text' : 'password';
        eyeIcon.innerHTML = show
            ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Enable submit button only when both fields are filled
    const emailInput = document.getElementById('email');
    const btnLogin   = document.getElementById('btn-login');

    function checkFields() {
        btnLogin.disabled = !(emailInput.value.trim() && pwdInput.value.trim());
    }
    emailInput.addEventListener('input', checkFields);
    pwdInput.addEventListener('input', checkFields);
</script>

</body>
</html>
