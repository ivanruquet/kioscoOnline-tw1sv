<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Kiosco UNLAM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!--    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"-->
<!--          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">-->
    <link rel="stylesheet" th:href="@{/css/login.css}" />

</head>

<body>
    <div class="page-wrap">

    <!-- ── LEFT PANEL ── -->
        <div th:replace="fragmentos/panelIzqLogin :: panelIzq"></div>


        <!-- ── RIGHT PANEL ── -->
        <div class="right-panel">
        <div class="login-card">
            <h2>Registrate</h2>
            <p class="subtitle">Carga tus datos para registrarte a KioNet Unlam</p>

            <div id="loginbox" style="margin-top:50px;" class="mainbox col-md-6 col-md-offset-3 col-sm-8 col-sm-offset-2">
                <form action="#" th:action="@{/registrarme}" method="POST" th:object="${usuario}">
<!--                    <h3 class="form-signin-heading">Datos personales:</h3>-->

                    <label class="form-label" for="nombre">Nombre</label>
                    <div class="input-wrap">
                        <span class="input-icon">

                        </span>
                        <input th:field="*{nombre}" id="nombre" type="text" class="form-control" placeholder="Ingrese su nombre" required />
                    </div>

                    <label class="form-label" for="apellido">Apellido</label>
                    <div class="input-wrap">
                        <span class="input-icon">

                        </span>

                        <input th:field="*{apellido}" id="apellido" type="text" class="form-control" placeholder="Ingrese su apellido" required />
                    </div>

                    <label class="form-label" for="dni">DNI</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
                            </svg>
                        </span>

                        <input th:field="*{dni}" id="dni" type="number" class="form-control" placeholder="Ingrese su DNI" required />
                    </div>

                    <label class="form-label" for="celular">Celular</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2.19 19.79 19.79 0 0 1-8.63-3.07
                                                 19.5 19.5 0 0 1-6-6
                                                 19.79 19.79 0 0 1-3.07-8.67
                                                 A2 2 0 0 1 4.11 2h3
                                                 a2 2 0 0 1 2 1.72
                                                 12.84 12.84 0 0 0 .7 2.81
                                                 a2 2 0 0 1-.45 2.11L8.09 9.91
                                                 a16 16 0 0 0 6 6l1.27-1.27
                                                 a2 2 0 0 1 2.11-.45
                                                 12.84 12.84 0 0 0 2.81.7
                                                 A2 2 0 0 1 22 16.92z"/>
                                </svg>
                        </span>
                        <input th:field="*{celular}" id="celular" type="text" class="form-control" placeholder="Ingrese su número de celular" required />
                    </div>

                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                        <input th:field="*{email}" id="email" type="email" class="form-control" placeholder="ejemplo@correo.com" required />
                    </div>

                    <label class="form-label" for="password">Contraseña</label>
                    <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    </span>
                        <input th:field="*{password}" id="password" type="password" class="form-control" placeholder="••••••••" required />
                        <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Mostrar contraseña">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <button id="btn-registrarme" class="btn-login" Type="Submit">Registrarme</button>
                    <p th:if="${error != null}" class="alert alert-danger" th:text="'Error ' + ${error}">
                    </p>

                    <p class="register-link">
                        ¿Ya tenés tu cuenta?<a href="login"> Iniciá sesión</a>
                    </p>

                </form>
            </div>

        </div>
        <div class="security-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <div>
                <strong>Plataforma 100% segura</strong>
                <span>Tus datos están protegidos</span>
            </div>
        </div>
    </div>
    </div>

  <!-- /.container -->

  <!-- Boostrap core js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

</body>

</html>
