<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Mis Hijos - KioNet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/variablesColor.css}" />
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <link rel="stylesheet" th:href="@{/css/perfil.css}" />
    <link rel="stylesheet" th:href="@{/css/vistaHijos.css}" />
</head>


<body>
<div class="container-fluid">

    <div th:replace="fragmentos/header :: header"></div>

    <main class="main">
        <section class="panel-cliente">
            <div th:replace="fragmentos/panelIzqCliente :: panelCliente"></div>

<!--            <a href="/spring/home" class="btn-volver"> Ir a Tienda</a>-->
            <a th:href="@{/perfil}" class="btn-volver"> Mi perfil</a>


        </section>
        <div class="seccion-hijos">
            <div class="welcome-banner">
                <h1>Mis hijos</h1>
            </div>

            <p th:if="${mensajeError}" th:text="${mensajeError}" class="mensaje-error"></p>
            <!-- tarjetas de hijos -->

            <div class="hijos-grid" th:if="${hijos}">
                <div class="hijo-card" th:each="hijo : ${hijos}">
                    <img th:if="${hijo.fotoPerfil != null}" th:src="${hijo.fotoPerfil}" class="hijo-avatar" alt="foto hijo">
                    <div th:unless="${hijo.fotoPerfil != null}" class="hijo-avatar-iniciales">
                        <span th:text="${#strings.substring(hijo.nombre,0,1)}"></span>
                    </div>
                    <p class="hijo-nombre" th:text="${hijo.nombre}"></p>
                    <span class="hijo-badge" th:text="${hijo.curso.descripcion}"></span>
                    <!-- ACA IRIA CODIGO DE RETIRO: Y EL HASH QUE SE DEBE GENERAR-->
                    <!-- UN BOTON DE IMPRIMIR CREDENCIAL  QUE ARME UNA VISTA  PARA GENERAR EL PDF-->
                </div>

            </div>
            <div class="agregar-hijo-banner">
                <div>
                    <strong>¿Tenés un nuevo hijo en el colegio?</strong>
                </div>
                <!--<a href="/spring/agregarHijo" class="btn-agregar" disabled="true">+ Agregar hijo</a>-->
                <button class="btn-agregar" id="btnAbrirForm">
                    + Agregar hijo
                </button>
            </div>

            <div class="modal-overlay" id="modalOverlay">
                <div class="modal-card">
                    <div class="modal-header">
                        <h2>Agregar hijo</h2>
                        <button class="btn-cerrar-modal" id="btnCerrar" aria-label="Cerrar">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                <form th:action="@{/guardarHijo}" method="post" enctype="multipart/form-data" class="form-hijo">
                    <div class="form-grid">
                        <div class="campo-edicion">
                            <span class="dato-label">Nombre</span>
                            <input type="text" name="nombre" placeholder="Nombre">
                        </div>
                        <div class="campo-edicion">
                            <span class="dato-label">Apellido</span>
                            <input type="text" name="apellido" placeholder="Apellido">
                        </div>
                        <div class="campo-edicion">
                            <span class="dato-label">DNI</span>
                            <input type="number" name="dni" placeholder="DNI">
                        </div>
                        <div class="campo-edicion">
                            <span class="dato-label">Fecha de nacimiento</span>
                            <input type="date" name="fechaNac">
                        </div>
                    </div>

                    <div class="campo-edicion">
                        <span class="dato-label">Foto de perfil</span>
                        <input type="file" name="fotoPerfil" accept="image/*">
                    </div>

                    <div class="campo-edicion">
                        <span class="dato-label">Curso</span>
                        <div class="form-grid">
                            <select name="anio">
                                <option value="">Año</option>
                                <option value="1">1°</option>
                                <option value="2">2°</option>
                                <option value="3">3°</option>
                                <option value="4">4°</option>
                                <option value="5">5°</option>
                                <option value="6">6°</option>
                            </select>
                            <select name="division">
                                <option value="">División</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                    </div>


                    <div class="acciones-edicion">
                        <button type="button" class="btn-cancelar" id="btnCancelar">Cancelar</button>
                        <button type="submit" class="btn-guardar">Guardar</button>
                    </div>
                </form>

            </div>

        </div>
        </div>
    </main>
</div>
<script>
    const overlay = document.getElementById('modalOverlay');
    document.getElementById('btnAbrirForm').addEventListener('click', () => overlay.classList.add('visible'));
    document.getElementById('btnCerrar').addEventListener('click', () => overlay.classList.remove('visible'));
    document.getElementById('btnCancelar').addEventListener('click', () => overlay.classList.remove('visible'));
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('visible'); });
</script>
</body>
</html>
