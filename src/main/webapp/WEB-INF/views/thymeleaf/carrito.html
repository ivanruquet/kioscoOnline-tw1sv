<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioNet - Mi Carrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <link rel="stylesheet" th:href="@{/css/carrito.css}" />
</head>

<body>
<div class="container-fluid">
    <div th:replace="fragmentos/header :: header"></div>


    <div class="app-container">
        <main class="cart-layout">

            <section class="cart-items-section">
                <h2 class="section-title">Tu pedido</h2>

                <div class="cart-items-list">

                    <div class="cart-item-card" th:each="item : ${carrito}">
                        <img class="item-image bg-pastel-purple" th:src="${item.producto.imagen}"></img>
                        <div class="item-details">
                            <h3 class="item-name" th:text="${item.producto.nombre}"></h3>
                        </div>
                        <div class="item-actions">
                            <div class="quantity-control">
                                <form th:action="@{/carrito/restar}" method="post">
                                    <input type="hidden"
                                           name="productoId"
                                           th:value="${item.producto.id}">

                                    <button class="qty-btn" type="submit">-</button>
                                </form>
                                <!-- <button class="qty-btn">−</button> -->
                                <span class="qty-number" th:text="${item.cantidad}"></span>
                                <form th:action="@{/carrito/aumentar}" method="post">
                                    <input type="hidden"
                                           name="productoId"
                                           th:value="${item.producto.id}">

                                    <button class="qty-btn" type="submit">+</button>
                                </form>
                                <!-- <button class="qty-btn">+</button> -->
                            </div>
                            <p class="item-price">
                                $<span th:text="${item.producto.precio}"></span>
                            </p>
                            <form th:action="@{/carrito/eliminar}" method="post">
                                <input type="hidden"
                                       name="productoId"
                                       th:value="${item.producto.id}">

                                <button type="submit" class="remove-btn">🗑️</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

            <aside class="cart-summary-section">
                <div class="summary-card">
                    <h2 class="summary-title">Resumen de compra</h2>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>
                            $<span th:text="${total}"></span>
                        </span>
                    </div>

                    <hr class="summary-divider">

                    <div class="summary-row total-row">
                        <span>Total</span>
                        <span>
                            $<span th:text="${total}"></span>
                        </span>
                    </div>

                    <form th:action="@{/pagar}" method="GET" style="width: 100%;">
                        <button type="submit" class="btn-primary" style="width: 100%; cursor: pointer;">
                            Pagar con Mercado Pago
                        </button>
                    </form>

                    <div th:if="${error}" class="alert-error-custom" style="background-color: #ffdbdb; color: #d92d2d; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 14px; text-align: center; font-weight: 500; border: 1px solid #f5baba;">
                        ⚠️ <span th:text="${error}"></span>
                    </div>

                    <div class="secure-checkout">
                        <span>🔒 Plataforma 100% segura</span>
                        <p>Tus datos están protegidos</p>
                    </div>
                </div>
            </aside>

        </main>
    </div>

</div>

</body>
</html>
