    <!DOCTYPE HTML>
    <html lang="es" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>Distribuir Pedido - KioNet</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/variablesColor.css}" />
        <link rel="stylesheet" th:href="@{/css/home.css}" />
        <link rel="stylesheet" th:href="@{/css/distribucion.css}" />
    </head>

    <body>
    <div class="container-fluid">

        <div th:replace="fragmentos/header :: header"></div>

        <main class="main">
            <section class="panel-cliente">
                <div th:replace="fragmentos/panelIzqCliente :: panelCliente"></div>
                <a th:href="@{/home}" class="btn-volver">Ir a tienda</a>
            </section>

            <section class="panel-tienda">

                <div class="welcome-banner">
                    <div>
                        <h1>¿Para quién es cada producto?</h1>
                        <h2>Asigná las cantidades de productos para cada hijo antes de confirmar el pedido</h2>
                    </div>
                </div>

                <div th:if="${errorDistribucion}" class="alerta-error" th:text="${errorDistribucion}"></div>

                <div th:if="${#lists.isEmpty(productos)}" class="carrito-vacio">
                    <p>No tenés productos en el carrito.</p>
                    <a th:href="@{/home}" class="btn-agregar-productos">+ Agregar productos</a>
                </div>

                <div th:unless="${#lists.isEmpty(productos)}" class="tabla-wrap">
                    <!-- SIN th:action ni method: el submit lo maneja el JS via fetch -->
                    <form id="formDistribucion" th:action="@{/distribucion/confirmar}"
                          method="post">
                        <div class="tabla-scroll">
                            <table>
                                <thead>
                                <tr>
                                    <th class="col-producto">Producto</th>
                                    <th th:each="hijo : ${hijos}" class="col-hijo">
                                        <div class="hijo-header">
                                            <div class="hijo-avatar"
                                                 th:text="${#strings.substring(hijo.nombre,0,1)}"></div>
                                            <span th:text="${hijo.nombre}"></span>
                                        </div>
                                    </th>
                                    <th class="col-eliminar"></th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="producto : ${productos}" th:data-producto-id="${producto.id}">
                                    <td class="producto-cell">
                                        <div class="producto-info">
                                            <img th:if="${producto.imagen != null}"
                                                 th:src="${producto.imagen}"
                                                 class="producto-img" alt="">
                                            <img th:unless="${producto.imagen != null}"
                                                 th:src="@{/imagenes/imagenesDefault/caramelo.png}"
                                                 class="producto-img" alt="">
                                            <div>
                                                <div class="producto-nombre" th:text="${producto.nombre}"></div>
                                                <div class="producto-precio">$<span th:text="${producto.precio}"></span></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td th:each="hijo : ${hijos}" class="col-hijo">
                                        <div class="qty-control" th:data-stock="${producto.cantidad}">
                                            <button type="button" class="qty-btn" onclick="cambiar(this, -1)">−</button>
                                            <input type="hidden"
                                                   th:name="'hijoId'+ ${hijo.id}+'_prodId'+ ${producto.id}"
                                                   th:data-hijo-id="${hijo.id}"
                                                   class="qty-input" th:value="${cantidadesPrevias[hijo.id + '_' + producto.id] ?: 0}">
                                            <span class="qty-num" th:text="${cantidadesPrevias[hijo.id + '_' + producto.id] ?: 0}" ></span>
                                            <button type="button" class="qty-btn" onclick="cambiar(this, 1)">+</button>
                                        </div>
                                    </td>
                                    <td class="col-eliminar">
                                        <button type="button" class="btn-trash"
                                                onclick="eliminarFila(this)"
                                                aria-label="Eliminar producto">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                            </svg>
                                        </button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="tabla-footer">
                            <a th:href="@{/home}" class="btn-agregar-productos">+ Agregar más productos</a>
                            <button type="submit" class="btn-confirmar">
                                Confirmar pedido
                            </button>
                        </div>
                    </form>
                </div>

            </section>
        </main>
    </div>

    <script th:src="@{/js/distribucion-funciones.js}"></script>
    <script th:src="@{/js/drawer.js}"></script>
    </body>
    </html>
